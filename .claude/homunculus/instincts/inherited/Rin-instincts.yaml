# Rin Workflow Feature Development With Schema Migration Tests And I18n

## Action

Follow the feature-development-with-schema-migration-tests-and-i18n workflow:
1. Create or update SQL migration file in server/sql/NNNN.sql
2. Update Drizzle schema in server/src/db/schema.ts
3. Update shared API types in packages/api/src/types.ts
4. Update validation schemas in packages/api/src/schemas.ts
5. Implement backend logic in server/src/services/*.ts
6. Update or create frontend UI in client/src/page/*.tsx
7. Add or update locale translation files in client/public/locales/*/translation.json
8. Update test fixtures in server/tests/fixtures/index.ts
9. Add or update backend tests in server/src/services/__tests__/*.test.ts

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: server/sql/NNNN.sql, server/src/db/schema.ts, packages/api/src/types.ts

